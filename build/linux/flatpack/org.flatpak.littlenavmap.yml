id: org.flatpak.littlenavmap
runtime: org.kde.Platform
runtime-version: '5.15-23.08'
sdk: org.kde.Sdk
command: littlenavmap.sh
finish-args:
  # Graphics
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  # Network access for maps, weather, etc.
  - --share=network
  # Access to flight simulator data, flight plans, etc.
  - --filesystem=home
modules:
  - name: krb5
    subdir: src
    config-opts:
      - --localstatedir=/var/lib
      - --sbindir=/app/bin
      - --disable-static
      - --disable-rpath
    sources:
      - type: archive
        url: https://kerberos.org/dist/krb5/1.21/krb5-1.21.2.tar.gz
        sha256: 9560941a9d843c0243a71b17a7ac6fe31c7cebb5bce3983db79e52ae7e850491
    cleanup:
      - /bin
      - /share/man
      - /var/lib
      - /include
  - name: littlenavmap
    buildsystem: simple
    build-commands:
      # Copy all the application files into /app/, preserving attributes
      - cp -a ./* /app/
      # Make sure the main executable is executable
      - chmod +x /app/littlenavmap
      # Create the bin directory
      - install -d /app/bin
      # Install desktop file
      - install -Dm644 org.flatpak.littlenavmap.desktop /app/share/applications/org.flatpak.littlenavmap.desktop
      # Install SVG icon
      - install -Dm644 littlenavmap.svg /app/share/icons/hicolor/scalable/apps/org.flatpak.littlenavmap.svg
      # Create a wrapper script to run the application with proper library path
      - |
        cat <<EOF > /app/bin/littlenavmap.sh
        #!/bin/sh
        export LD_LIBRARY_PATH="/app/lib:\$LD_LIBRARY_PATH"
        cd /app
        exec ./littlenavmap "\$@"
        EOF
      - chmod +x /app/bin/littlenavmap.sh
    sources:
      - type: dir
        path: LittleNavmapPortable
      - type: file
        path: org.flatpak.littlenavmap.desktop